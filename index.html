
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout v2</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { margin: 0; padding: 0; background: var(--bg-dark); color: var(--text-main); padding-bottom: 100px; }

        /* HEADER & TABS (Ultra Compactos) */
        header { background: var(--bg-dark); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); padding-top: 10px;}
        h1 { margin: 0; font-size: 1.2rem; color: var(--accent); text-align: center; padding-bottom: 10px;}

        .tabs { display: flex; overflow-x: auto; gap: 8px; padding: 0 10px 10px 10px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); padding: 6px 14px; border-radius: 15px; font-weight: 600; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* CONTENT */
        .day-container { display: none; padding: 10px; }
        .day-container.active { display: block; }

        .session-title { font-size: 0.85rem; color: var(--warning); text-transform: uppercase; margin: 10px 0 5px 0; font-weight: 700; letter-spacing: 1px;}
        .am-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; border-left: 3px solid var(--warning);}

        /* EXERCISE ROWS (Compact Grid) */
        .ex-row { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 10px; 
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s;
        }

        .ex-row.active-ex { border-color: var(--accent); box-shadow: 0 0 8px rgba(16,185,129,0.2); }
        .ex-row.completed { opacity: 0.5; border-color: var(--border); }

        .ex-info { display: flex; justify-content: space-between; align-items: center; }
        .ex-name { font-size: 0.95rem; font-weight: 700; margin: 0; }
        .ex-reps { font-size: 0.8rem; color: var(--text-muted); background: var(--bg-dark); padding: 2px 6px; border-radius: 4px;}

        .ex-controls { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;}

        /* DUAL WEIGHT DROPDOWNS */
        .weight-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-dark);
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        
        .weight-group span {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        .weight-sel {
            background: transparent;
            color: var(--text-main);
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
            padding: 0;
            -webkit-appearance: none; /* Eliminar flecha nativa en iOS para ahorrar espacio */
            appearance: none;
            text-align: center;
        }

        /* SETS TRACKER */
        .sets-wrap { display: flex; gap: 4px; flex: 1; min-width: 60px;}
        .set-dot { height: 28px; flex: 1; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; transition: 0.2s; }
        .set-dot.done { background: var(--accent); border-color: var(--accent); }

        /* BUTTON */
        .btn-timer {
            background: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .active-ex .btn-timer { background: var(--accent); border-color: var(--accent); color: white; }
        .completed .btn-timer { visibility: hidden; }

        /* FLOATING TIMER */
        #global-timer {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: var(--bg-card);
            border: 2px solid var(--accent); border-radius: 12px; padding: 12px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); display: none; z-index: 1000;
        }
        .timer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .timer-title { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;}
        .timer-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 0;}
        .timer-display { font-size: 2.2rem; font-weight: 700; text-align: center; margin: 0; line-height: 1;}
        .progress-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden;}
        #timer-progress { height: 100%; width: 0%; background: var(--accent); transition: width 1s linear;}
        .timer-red { color: #ef4444; }
        .timer-red-bg { background: #ef4444 !important; }

    </style>
</head>
<body>

    <header>
        <h1>RubFitPro Auto-Tracker v2</h1>
        <div class="tabs" id="tabs-container"></div>
    </header>

    <main id="content-container"></main>

    <div id="global-timer">
        <div class="timer-header">
            <span class="timer-title" id="timer-title">Descanso</span>
            <button class="timer-close" onclick="stopTimer()">×</button>
        </div>
        <div class="timer-display" id="timer-time">00:00</div>
        <div class="progress-bg"><div id="timer-progress"></div></div>
    </div>

    <script>
        // 1. DATA RUTINA (Ajustado con nuevo ejercicio de pecho)
        const routineData = {
            "Lunes": {
                "am": "30 min Carrera + 10 min Activación (Hombro/Core)",
                "pm": [
                    { id: "lun1", name: "Press suelo mancuernas", sets: 4, reps: "8-10", rest: 120 },
                    { id: "lun1b", name: "Aperturas suelo mancuernas", sets: 3, reps: "10-12", rest: 90 }, // NUEVO EJERCICIO DE PECHO
                    { id: "lun2", name: "Press hombro", sets: 4, reps: "8-10", rest: 90 },
                    { id: "lun3", name: "Elevaciones laterales", sets: 4, reps: "12-15", rest: 60 },
                    { id: "lun4", name: "Extensión tríceps", sets: 3, reps: "12", rest: 60 }
                ],
                "finisher": "15 flexiones + 20 laterales ligeras + 30'' plancha (x2 Rondas)"
            },
            "Martes": {
                "am": "30 min Carrera + 10 min Movilidad escapular",
                "pm": [
                    { id: "mar1", name: "Remo 1 mano", sets: 4, reps: "8-10", rest: 120 },
                    { id: "mar2", name: "Remo inclinado", sets: 3, reps: "10-12", rest: 90 },
                    { id: "mar3", name: "Peso muerto rumano", sets: 3, reps: "8-10", rest: 120 },
                    { id: "mar4", name: "Pájaros", sets: 3, reps: "12-15", rest: 60 },
                    { id: "mar5", name: "Curl bíceps", sets: 3, reps: "10-12", rest: 60 },
                    { id: "mar6", name: "Curl martillo", sets: 3, reps: "10-12", rest: 60 }
                ],
                "finisher": "12 remo exp. + 15 curl alterno + 30'' hollow (x2)"
            },
            "Miércoles": {
                "am": "25 min Caminata rápida + Movilidad cadera",
                "pm": [
                    { id: "mie1", name: "Sentadilla Goblet", sets: 4, reps: "10-12", rest: 120 },
                    { id: "mie2", name: "Zancadas", sets: 3, reps: "10 p/p", rest: 90 },
                    { id: "mie3", name: "Sentadilla búlgara", sets: 3, reps: "10 p/p", rest: 90 },
                    { id: "mie4", name: "Hip thrust", sets: 3, reps: "12", rest: 90 },
                    { id: "mie5", name: "Gemelos", sets: 4, reps: "15-20", rest: 60 }
                ],
                "finisher": "20 sentadillas + 15 squat jumps + 30'' wall sit (x2)"
            },
            "Jueves": {
                "am": "40 min Caminata ligera",
                "pm": [
                    { id: "jue1", name: "Plancha", sets: 3, reps: "45''", rest: 60 },
                    { id: "jue2", name: "Dead bug", sets: 3, reps: "12", rest: 60 },
                    { id: "jue3", name: "Hollow hold", sets: 3, reps: "30''", rest: 60 },
                    { id: "jue4", name: "Bird dog", sets: 3, reps: "10", rest: 60 }
                ],
                "finisher": "Movilidad completa: Cadera, hombro, dorsal."
            },
            "Viernes": {
                "am": "30 min Carrera",
                "pm": [
                    { id: "vie1", name: "Dominadas", sets: 4, reps: "Fallo", rest: 120 },
                    { id: "vie2", name: "Fondos", sets: 4, reps: "Max", rest: 90 },
                    { id: "vie3", name: "Flexiones", sets: 3, reps: "Max", rest: 90 },
                    { id: "vie4", name: "Sentadilla exp.", sets: 3, reps: "15", rest: 90 }
                ],
                "finisher": "10 min Core en parque"
            }
        };

        // Options para el Dropdown de pesos (6 a 30kg)
        let weightOptions = '<option value="">-</option>';
        for(let w=6; w<=30; w++) {
            weightOptions += `<option value="${w}">${w}</option>`;
        }

        let workoutState = {};

        function initApp() {
            const tabs = document.getElementById('tabs-container');
            const content = document.getElementById('content-container');
            let isFirst = true;

            for (const [day, data] of Object.entries(routineData)) {
                // TABS
                tabs.innerHTML += `<button class="tab-btn ${isFirst?'active':''}" onclick="switchTab('${day}')">${day}</button>`;
                
                // CONTENT
                let html = `<div id="day-${day}" class="day-container ${isFirst?'active':''}">
                    <div class="session-title">☀️ Sesión AM</div>
                    <div class="am-desc">${data.am}</div>
                    <div class="session-title" style="color:var(--accent);">🌙 Sesión PM</div>
                `;

                data.pm.forEach((ex, idx) => {
                    workoutState[ex.id] = { done: 0, total: ex.sets };
                    let dots = '';
                    for(let i=0; i<ex.sets; i++) dots += `<div class="set-dot" id="dot-${ex.id}-${i}"></div>`;
                    
                    html += `
                        <div class="ex-row ${idx===0 ? 'active-ex' : ''}" id="row-${ex.id}">
                            <div class="ex-info">
                                <span class="ex-name">${ex.name}</span>
                                <span class="ex-reps">${ex.sets}x${ex.reps}</span>
                            </div>
                            <div class="ex-controls">
                                <!-- DUAL DROPDOWNS PARA BRAZO IZQ Y DER -->
                                <div class="weight-group">
                                    <span>I:</span><select class="weight-sel" data-key="wL_${ex.id}">${weightOptions}</select>
                                    <span style="color:var(--border);">|</span>
                                    <span>D:</span><select class="weight-sel" data-key="wR_${ex.id}">${weightOptions}</select>
                                </div>
                                <div class="sets-wrap">${dots}</div>
                                <button class="btn-timer" id="btn-${ex.id}" onclick="nextSet('${ex.id}', ${ex.rest}, '${day}')">⏱ ${ex.rest}s</button>
                            </div>
                        </div>
                    `;
                });

                if(data.finisher) {
                    html += `
                        <div class="session-title" style="color:#ef4444; margin-top:15px;">🔥 Finisher</div>
                        <div class="am-desc" style="border-color:#ef4444;">${data.finisher}</div>
                    `;
                }
                html += `</div>`;
                content.innerHTML += html;
                isFirst = false;
            }

            // Cargar Pesos Guardados (Ambos brazos)
            document.querySelectorAll('.weight-sel').forEach(sel => {
                const key = sel.getAttribute('data-key');
                if(localStorage.getItem(key)) sel.value = localStorage.getItem(key);
                sel.addEventListener('change', e => localStorage.setItem(key, e.target.value));
            });
        }

        function switchTab(day) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.innerText === day);
            });
            document.querySelectorAll('.day-container').forEach(c => {
                c.classList.toggle('active', c.id === `day-${day}`);
            });
            stopTimer();
        }

        function nextSet(id, rest, day) {
            const state = workoutState[id];
            if(state.done < state.total) {
                document.getElementById(`dot-${id}-${state.done}`).classList.add('done');
                state.done++;
                
                if(state.done === state.total) {
                    const row = document.getElementById(`row-${id}`);
                    row.classList.remove('active-ex');
                    row.classList.add('completed');
                    
                    // Activar siguiente
                    const pmData = routineData[day].pm;
                    const curIdx = pmData.findIndex(e => e.id === id);
                    if(curIdx > -1 && curIdx < pmData.length - 1) {
                        const nextId = pmData[curIdx + 1].id;
                        const nextRow = document.getElementById(`row-${nextId}`);
                        nextRow.classList.add('active-ex');
                        setTimeout(() => nextRow.scrollIntoView({behavior: 'smooth', block: 'center'}), 200);
                    }
                }
                startTimer(rest, id);
            }
        }

        // TIMER
        let timerInt;
        function startTimer(sec, id) {
            clearInterval(timerInt);
            let exName = "Descanso";
            for (const d in routineData) {
                const f = routineData[d].pm.find(e => e.id === id);
                if(f) exName = f.name;
            }
            
            document.getElementById('timer-title').innerText = exName;
            const ui = document.getElementById('global-timer');
            const disp = document.getElementById('timer-time');
            const prog = document.getElementById('timer-progress');
            
            ui.style.display = 'block';
            disp.classList.remove('timer-red');
            prog.classList.remove('timer-red-bg');
            
            let left = sec;
            updateUI(left, sec, disp, prog);

            timerInt = setInterval(() => {
                left--;
                if(left <= 10) { disp.classList.add('timer-red'); prog.classList.add('timer-red-bg'); }
                if(left < 0) {
                    clearInterval(timerInt);
                    disp.innerText = "¡VA!";
                    if(navigator.vibrate) navigator.vibrate([200,100,200]);
                    setTimeout(() => ui.style.display='none', 3000);
                    return;
                }
                updateUI(left, sec, disp, prog);
            }, 1000);
        }

        function updateUI(l, t, disp, prog) {
            disp.innerText = `${Math.floor(l/60).toString().padStart(2,'0')}:${(l%60).toString().padStart(2,'0')}`;
            prog.style.width = `${((t-l)/t)*100}%`;
        }

        function stopTimer() { clearInterval(timerInt); document.getElementById('global-timer').style.display = 'none'; }

        window.onload = initApp;
    </script>
</body>
</html>
