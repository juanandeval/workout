<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout v3 - Intensidad Pro</title>
    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --accent: #10b981; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; --warning: #f59e0b; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; }
        header { position: sticky; top: 0; background: var(--bg-dark); border-bottom: 1px solid var(--border); padding: 10px; z-index: 100; }
        h1 { font-size: 1.2rem; color: var(--accent); text-align: center; margin: 0 0 10px 0; }
        .tabs { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; }
        .tab-btn { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 15px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: white; }
        .day-container { display: none; padding: 10px; }
        .day-container.active { display: block; }
        .ex-row { background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .ex-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 10px; align-items: center; font-size: 0.85rem; }
        select, input { background: var(--bg-dark); color: white; border: 1px solid var(--border); padding: 4px; border-radius: 4px; }
        .ex-link { text-decoration: none; opacity: 0.6; }
    </style>
</head>
<body>
    <header>
        <h1>Workout v3 - Intensidad</h1>
        <div class="tabs" id="tabs-container"></div>
    </header>
    <main id="content-container"></main>

    <script>
        const routineData = {
            "Lunes (Empuje)": [
                { id: "e1", name: "Press Búlgaro (manc)", sets: 3, reps: "8-10" },
                { id: "e2", name: "Press inclinado (manc)", sets: 3, reps: "8-10" },
                { id: "e3", name: "Elev. laterales (pausa 2s)", sets: 4, reps: "12-15" }
            ],
            "Martes (Pierna)": [
                { id: "p1", name: "Sentadilla Búlgara", sets: 4, reps: "8-10" },
                { id: "p2", name: "Peso Muerto Rumano", sets: 4, reps: "10-12" },
                { id: "p3", name: "Zancadas caminadas", sets: 3, reps: "15 pasos" }
            ],
            "Miércoles (Tirón)": [
                { id: "t1", name: "Dominadas", sets: 4, reps: "Fallo" },
                { id: "t2", name: "Remo inclinado (barra)", sets: 4, reps: "8-10" },
                { id: "t3", name: "Pájaros (pausa 2s)", sets: 3, reps: "12-15" }
            ]
        };

        function initApp() {
            const tabs = document.getElementById('tabs-container');
            const content = document.getElementById('content-container');
            let isFirst = true;

            for (const [day, exercises] of Object.entries(routineData)) {
                tabs.innerHTML += `<button class="tab-btn ${isFirst?'active':''}" onclick="switchTab('${day}')">${day}</button>`;
                
                let html = `<div id="day-${day}" class="day-container ${isFirst?'active':''}">`;
                exercises.forEach(ex => {
                    html += `
                        <div class="ex-row">
                            <div class="ex-info">
                                <span>${ex.name} <a href="https://www.google.com/search?q=como+hacer+${ex.name.replace(/ /g,'+')}" target="_blank" class="ex-link">🔍</a></span>
                                <span>${ex.sets}x${ex.reps}</span>
                            </div>
                            <div class="controls">
                                RPE: <select id="rpe_${ex.id}"><option>7</option><option>8</option><option>9</option><option>10</option></select>
                                Kg: <input type="number" id="kg_${ex.id}" style="width:50px">
                            </div>
                        </div>`;
                });
                html += `</div>`;
                content.innerHTML += html;
                isFirst = false;
            }
        }

        function switchTab(day) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === day));
            document.querySelectorAll('.day-container').forEach(c => c.classList.toggle('active', c.id === `day-${day}`));
        }

        window.onload = initApp;
    </script>
</body>
</html>
